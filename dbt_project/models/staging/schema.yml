version: 2

models:
  - name: stg_dim_cnae
    description: CNAE 2.x hierarchy from basedosdados, standardized.
    columns:
      - name: cnae_subclasse
        description: 7-digit subclass code (e.g. "0111301").
      - name: cnae_classe
        description: 5-digit class code.
      - name: cnae_secao
        description: Single-letter section code.

  - name: stg_dim_cbo
    description: CBO 2002 occupations from basedosdados, standardized.
    columns:
      - name: cbo_codigo
        description: 6-digit occupation code.
      - name: cbo_grande_grupo_codigo
        description: Major group code.
      - name: cbo_ativa
        description: Flag — 1 if the occupation is still active.

  - name: stg_dim_municipio
    description: IBGE municipalities, standardized identifiers.
    columns:
      - name: municipio_id
        description: 7-digit IBGE code (join key with RAIS and SIM).
      - name: municipio_id_6
        description: 6-digit IBGE code (without check digit).
      - name: sigla_uf
        description: 2-letter UF code, uppercased.

  - name: stg_dim_grau_risco
    description: Occupational risk level per CNAE class per NR-04 Annex I.
    columns:
      - name: cnae_classe
        description: 5-digit CNAE class code.
      - name: grau_risco
        description: Risk level 1-4.
      - name: grau_risco_descricao
        description: "Human-readable label: Leve, Medio, Alto, Critico."

  - name: stg_fact_rais
    description: RAIS active employment bonds aggregated by CNAE x CBO x municipality x year.
    columns:
      - name: cnae_subclasse
        description: 7-digit CNAE subclass code — joins with stg_dim_cnae.cnae_subclasse.
      - name: cnae_classe
        description: 5-digit class code (left 5 of subclasse) — joins with stg_dim_grau_risco.
      - name: cbo_codigo
        description: 6-digit CBO occupation code.
      - name: quantidade_vinculos
        description: Count of active bonds as of Dec 31 (vinculo_ativo_3112 = 1).

  - name: stg_fact_sim
    description: SIM mortality records with occupation code.
    columns:
      - name: cbo_codigo
        description: 6-digit CBO occupation code.
      - name: cid_10_causa
        description: ICD-10 underlying cause of death.
      - name: acidente_trabalho
        description: Work accident flag from SIM source.
      - name: total_obitos
        description: Count of deaths in this group.

  - name: stg_fact_cat
    description: CAT work accident communications from INSS portal (SP 2022).
    columns:
      - name: cbo_codigo
        description: 6-digit CBO code extracted from raw text field.
      - name: cnae_classe
        description: 5-digit CNAE class, zero-padded from the 4-digit source code.
      - name: municipio_id_6
        description: 6-digit IBGE municipality code extracted from raw text field.
      - name: obito
        description: True if indica_obito = 'Sim'.
